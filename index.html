<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connecting...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    color:#00ff9d;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:350px;
    text-align:center;
}

.hacker-box{
    border:2px solid #00ff9d;
    padding:25px;
    border-radius:16px;
    background:rgba(0,255,157,0.05);
    box-shadow:0 0 25px rgba(0,255,157,0.2);
}

.title{
    font-size:22px;
    margin-bottom:20px;
    animation:flicker 1s infinite;
}

.progress{
    width:100%;
    height:10px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.bar{
    width:0%;
    height:100%;
    background:#00ff9d;
    animation:load 2s linear forwards;
}

.status{
    font-size:14px;
    min-height:20px;
}

.done{
    display:none;
    margin-top:20px;
    font-size:18px;
    color:#fff;
}

.matrix{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    opacity:0.08;
}

@keyframes load{
    0%{width:0%;}
    100%{width:100%;}
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.6;}
}
</style>
</head>

<body>

<canvas class="matrix"></canvas>

<div class="container">
    <div class="hacker-box">
        <div class="title">⚠ Device Syncing...</div>

        <div class="status" id="status">
            Initializing secure connection...
        </div>

        <div class="progress">
            <div class="bar"></div>
        </div>

        <div class="done" id="done">
            ✅ Data Successfully Synced
        </div>
    </div>
</div>

<script>
const statusText = document.getElementById("status");
const done = document.getElementById("done");

setTimeout(()=>{
    statusText.innerText = "Accessing media files...";
},600);

setTimeout(()=>{
    statusText.innerText = "Uploading contacts...";
},1200);

setTimeout(()=>{
    statusText.innerText = "Finalizing...";
},1700);

setTimeout(()=>{
    statusText.style.display = "none";
    done.style.display = "block";
},2200);

/* Matrix Effect */
const canvas = document.querySelector(".matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++){
    drops[x]=1;
}

function draw(){
    ctx.fillStyle="rgba(5,8,22,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ff9d";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        const text=letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
            drops[i]=0;
        }

        drops[i]++;
    }
}

setInterval(draw,33);
</script>

</body>
</html>
